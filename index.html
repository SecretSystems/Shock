<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PiShock Controller</title>

  <style>
    body {
      background: #111827;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .app {
      width: 100%;
      max-width: 500px;
      background: #1f2937;
      padding: 25px;
      border-radius: 14px;
    }

    h1 {
      margin-top: 0;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      margin-bottom: 16px;
      border: none;
      border-radius: 8px;
      background: #374151;
      color: white;
    }

    label {
      font-size: 14px;
      color: #d1d5db;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 16px;
      cursor: pointer;
      color: white;
    }

    .beep {
      background: #2563eb;
    }

    .vibrate {
      background: #059669;
    }

    .shock {
      background: #dc2626;
    }

    .status {
      margin-top: 20px;
      background: #374151;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="app">

  <h1>PiShock Controller</h1>

  <label>Username</label>
  <input id="username" placeholder="PiShock Username">

  <label>API Key</label>
  <input id="apikey" placeholder="API Key">

  <label>Share Code</label>
  <input id="code" placeholder="Share Code">

  <label>Intensity (1-100)</label>
  <input id="intensity" type="number" value="10">

  <label>Duration (seconds)</label>
  <input id="duration" type="number" value="1">

  <button class="beep" onclick="sendCommand(2)">
    Beep
  </button>

  <button class="vibrate" onclick="sendCommand(1)">
    Vibrate
  </button>

  <button class="shock" onclick="sendCommand(0)">
    Shock
  </button>

  <div class="status" id="status">
    Ready
  </div>

</div>

<script>

async function sendCommand(op) {

  const username = document.getElementById("username").value;
  const apikey = document.getElementById("apikey").value;
  const code = document.getElementById("code").value;
  const intensity = parseInt(document.getElementById("intensity").value);
  const duration = parseInt(document.getElementById("duration").value);

  const status = document.getElementById("status");

  status.innerText = "Sending...";

  try {

    const response = await fetch(
      "https://do.pishock.com/api/apioperate",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          Username: username,
          Apikey: apikey,
          Code: code,
          Name: "CustomWebController",
          Op: op,
          Intensity: intensity,
          Duration: duration
        })
      }
    );

    const text = await response.text();

    status.innerText = text;

  } catch (err) {

    status.innerText = err.toString();

  }

}

</script>

</body>
</html>
